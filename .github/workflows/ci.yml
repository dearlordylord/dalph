name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node-support:
    name: Resolve supported Node versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read Node versions from package engines
        id: versions
        run: |
          node -e '
            const ranges = require("./package.json").engines.node.split(" || ")
            if (ranges.some((range) => !/^\^\d+\.\d+\.\d+$/.test(range))) {
              throw new Error("engines.node must contain caret minimums separated by ` || `")
            }
            const versions = ranges.map((range) => range.slice(1))
            require("node:fs").appendFileSync(process.env.GITHUB_OUTPUT, `versions=${JSON.stringify(versions)}\n`)
          '

  quality:
    name: Comprehensive quality gate (Node ${{ matrix.node-version }})
    needs: node-support
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.node-support.outputs.versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install gitleaks
        run: bash scripts/install-gitleaks.sh

      - name: Run comprehensive quality gate
        run: pnpm check:all
